version: '1.0'
metadata:
  name: stream-and-extensions
stores:
  - name: recordings
    columns:
      - { name: title, type: text }
api:
  - { method: PUT, path: '/recordings/{id}/upload', action: { kind: stream, handler: ingest_h, mode: ingest } }
  - { method: GET, path: '/recordings/{id}/media', action: { kind: stream, handler: playback_h, mode: playback } }
agents:
  - id: emu
    name: emu
    backend: pi
    model: pi-model
    instructions: produce json
    requireNativeStructuredOutput: false
    outputSchema:
      name: result
      schema:
        type: object
handlers:
  - { id: ingest_h, module: handlers/ingest.ts, export: ingest, kind: route }
  - { id: playback_h, module: handlers/playback.ts, export: playback, kind: route }
extensions:
  - id: audio_stream
    module: packs/audio_stream
    version: 1.2.3
    config:
      deepgramModel: nova-2
