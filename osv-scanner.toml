# osv-scanner configuration.
#
# A single, tightly scoped suppression. Everything else is scanned normally; a new advisory on any
# other package still fails the dependency-audit lane.

[[IgnoredVulns]]
id = "GHSA-frvp-7c67-39w9"
# @hono/node-server path traversal in `serve-static` on Windows via an encoded backslash (%5C).
# Not reachable in this project's use of the affected package:
#   - The direct @hono/node-server dependency is already 2.0.6 (the fixed line) everywhere it is
#     declared; the only 1.19.14 copy is pulled transitively by @modelcontextprotocol/sdk, which uses
#     the server for its JSON-RPC transport, never for static file serving — the vulnerable
#     `serve-static` code path is never entered.
#   - The advisory is Windows-only (it depends on the Windows path resolver treating `\` as a
#     separator); this project runs on Linux, and its continuous integration runs on Linux.
#   - That transitive server is a local, session-managed transport to a child process, not a
#     network-exposed static file server.
# Raising the transitive copy would force a foreign major version onto that SDK and is the larger
# risk. Tracked for removal once the SDK moves to the 2.x line.
reason = "serve-static path traversal, Windows-only, not reachable via the transitive JSON-RPC transport on Linux"
